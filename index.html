<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FA Workflow JS Embed Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .debug-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .debug-banner code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 13px;
        }
        h1 { font-size: 20px; color: #333; }
        .embed-container {
            background: #fff;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
        }
        .embed-container:empty::before {
            content: "Workflow will render here...";
            color: #999;
            font-style: italic;
        }
        .info {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        .info dt { font-weight: bold; margin-top: 8px; }
        .info dd { margin-left: 0; margin-bottom: 4px; }
    </style>
</head>
<body>
    <h1>FA Workflow JS Embed Test Page</h1>

    <div class="debug-banner">
        <strong>Debug info:</strong>
        Current URL query string: <code id="qs-display">(none)</code>
    </div>

    <!-- Target div where the workflow form will render -->
    <div id="fa-workflow" class="embed-container"></div>

    <!--
        INSTRUCTIONS:
        Replace the src below with your actual workflow embed URL.
        Example: https://app.formassembly.localhost:8443/publish/wf/YOUR_WORKFLOW_ID

        To test prefill, append query params to THIS page's URL, e.g.:
        https://localhost:8443/index.html?tfa_1=John&tfa_2=Doe
    -->

    <script src="https://uat-5-ec.cust.fd.vwsrv.net/publish/wf/wfQY3nq" data-qp-target-id="fa-workflow" defer></script>

    <dl class="info">
        <dt>Page URL</dt>
        <dd id="page-url"></dd>
        <dt>Referrer</dt>
        <dd id="page-referrer"></dd>
        <dt>Protocol</dt>
        <dd id="page-protocol"></dd>
    </dl>

    <script>
        // Display debug info
        document.getElementById('qs-display').textContent = location.search || '(none)';
        document.getElementById('page-url').textContent = location.href;
        document.getElementById('page-referrer').textContent = document.referrer || '(none)';
        document.getElementById('page-protocol').textContent = location.protocol;

        // Log all query params for debugging prefill
        const params = new URLSearchParams(location.search);
        if (params.toString()) {
            console.group('[FA Embed Test] Query parameters:');
            for (const [key, value] of params) {
                console.log(`  ${key} = ${value}`);
            }
            console.groupEnd();
        }
    </script>
</body>
</html>
